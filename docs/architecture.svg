<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6b8a91"/>
    </marker>
    <style>
      .box{rx:12; ry:12; stroke-width:2;}
      .title{font-size:15px; font-weight:700;}
      .sub{font-size:11.5px; fill:#33474d;}
      .tag{font-size:11px; fill:#6b8a91;}
      .edge{stroke:#6b8a91; stroke-width:2; fill:none; marker-end:url(#arrow);}
      .edgelbl{font-size:11px; fill:#33474d;}
    </style>
  </defs>

  <rect x="0" y="0" width="920" height="460" fill="#faf7f2"/>
  <text x="24" y="34" font-size="19" font-weight="700" fill="#1a4a5c">Tanah Mympi Housekeeping — System Architecture</text>

  <!-- Staff devices -->
  <rect class="box" x="24" y="80" width="190" height="120" fill="#ffffff" stroke="#2a7a8a"/>
  <text class="title" x="119" y="112" text-anchor="middle" fill="#1a4a5c">Staff devices</text>
  <text class="sub" x="119" y="136" text-anchor="middle">Phone / tablet / browser</text>
  <text class="sub" x="119" y="156" text-anchor="middle">Runs the app in-browser</text>
  <text class="tag" x="119" y="180" text-anchor="middle">(no install, just a URL)</text>

  <!-- GitHub Pages -->
  <rect class="box" x="270" y="70" width="200" height="140" fill="#ffffff" stroke="#1a4a5c"/>
  <text class="title" x="370" y="100" text-anchor="middle" fill="#1a4a5c">GitHub Pages</text>
  <text class="tag" x="370" y="118" text-anchor="middle">static hosting (HTTPS)</text>
  <text class="sub" x="370" y="142" text-anchor="middle">index.html (staff app)</text>
  <text class="sub" x="370" y="162" text-anchor="middle">dashboard.html (stats)</text>
  <text class="sub" x="370" y="182" text-anchor="middle">robots.txt (no-index)</text>

  <!-- Apps Script -->
  <rect class="box" x="530" y="70" width="200" height="140" fill="#ffffff" stroke="#c8963e"/>
  <text class="title" x="630" y="100" text-anchor="middle" fill="#1a4a5c">Apps Script Web App</text>
  <text class="tag" x="630" y="118" text-anchor="middle">/exec endpoint</text>
  <text class="sub" x="630" y="142" text-anchor="middle">doGet: staff names,</text>
  <text class="sub" x="630" y="160" text-anchor="middle">?action=records</text>
  <text class="sub" x="630" y="182" text-anchor="middle">doPost: login/submit/recall</text>

  <!-- Google Sheet -->
  <rect class="box" x="786" y="70" width="110" height="140" fill="#ffffff" stroke="#2e7d52"/>
  <text class="title" x="841" y="100" text-anchor="middle" fill="#1a4a5c">Google</text>
  <text class="title" x="841" y="118" text-anchor="middle" fill="#1a4a5c">Sheet</text>
  <text class="sub" x="841" y="146" text-anchor="middle">Staff tab</text>
  <text class="sub" x="841" y="166" text-anchor="middle">Records tab</text>
  <text class="tag" x="841" y="190" text-anchor="middle">(database)</text>

  <!-- Edges -->
  <path class="edge" d="M214,128 L268,128"/>
  <text class="edgelbl" x="241" y="120" text-anchor="middle">loads</text>

  <path class="edge" d="M470,150 L528,150"/>
  <text class="edgelbl" x="499" y="142" text-anchor="middle">fetch /</text>
  <text class="edgelbl" x="499" y="170" text-anchor="middle">POST</text>

  <path class="edge" d="M730,140 L784,140"/>
  <text class="edgelbl" x="757" y="132" text-anchor="middle">read /</text>
  <text class="edgelbl" x="757" y="200" text-anchor="middle">write</text>

  <!-- Direct browser-&gt;AppsScript call (the app talks to the backend, not via Pages) -->
  <path class="edge" d="M119,200 C119,300 630,320 630,212"/>
  <text class="edgelbl" x="375" y="338" text-anchor="middle">browser calls the backend directly (login, submit, load stats)</text>

  <!-- Legend / notes -->
  <text class="tag" x="24" y="404" fill="#6b8a91">Static files are served by GitHub Pages; all live data flows browser ⇄ Apps Script ⇄ Google Sheet.</text>
  <text class="tag" x="24" y="424" fill="#6b8a91">The dashboard reads data via the Apps Script "?action=records" endpoint (no PINs are ever returned).</text>
  <text class="tag" x="24" y="444" fill="#6b8a91">PINs are currently stored in plaintext in the Staff tab — see Security section.</text>
</svg>
